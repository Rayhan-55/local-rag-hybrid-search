services:
  ollama:
    image: ollama/ollama:latest
    container_name: rag-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    # Uncomment to use an NVIDIA GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  app:
    build: .
    container_name: rag-app
    depends_on:
      - ollama
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=qwen2.5:7b
      - OCR_ENGINE=tesseract
      - OCR_LANGUAGES=ben+eng
      - EMBEDDING_DEVICE=cpu
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage

volumes:
  ollama_models:
